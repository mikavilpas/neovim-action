---
name: CI checks
on:
  pull_request: ~
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # renovate: datasource=git-refs-master packageName=https://github.com/neovim/neovim
  NEOVIM_NIGHTLY_COMMIT: a787a314900ecf98c759a82030ac28992896cc88

jobs:
  # Build the pinned Neovim nightly once (cached by commit) and publish it as an
  # artifact, instead of rebuilding it in every matrix job on a cache miss.
  build-nightly:
    name: Build pinned Neovim nightly (${{ matrix.runner }})
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build pinned Neovim nightly
        uses: ./build-nightly
        id: build
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}
      - name: Verify Neovim nightly build is available at the output prefix
        run: |
          "${STEPS_BUILD_OUTPUTS_PREFIX}/bin/nvim" --version
        env:
          STEPS_BUILD_OUTPUTS_PREFIX: ${{ steps.build.outputs.prefix }}
      - name: Verify Neovim nightly was added to PATH
        run: nvim --version || (echo "nvim not found in PATH" && exit 1)
      - name: Verify Neovim nightly short commit id was output
        env:
          STEPS_BUILD_OUTPUTS_SHORT_COMMIT: ${{ steps.build.outputs.short-commit }}
        run: |
          echo "Short commit: ${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}"
          if [[ -z "${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}" ]]; then
            echo "Short commit output is empty"
            exit 1
          fi

          # Verify that the restored Neovim nightly matches the pinned commit
          short="$(printf '%s' "${{ env.NEOVIM_NIGHTLY_COMMIT }}" | cut -c1-7)"
          if [[ "${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}" != "$short" ]]; then
            echo "Restored Neovim nightly does not match the pinned commit. Expected: $short, Got: ${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}"
            exit 1
          fi

  restore-nightly:
    name: Restore previously built Neovim nightly (${{ matrix.runner }})
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: build-nightly
    permissions:
      contents: read
    outputs:
      prefix: ${{ steps.restore.outputs.prefix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore pinned Neovim nightly
        id: restore
        uses: ./restore-nightly
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}
      - name: Show Neovim version
        run: nvim --version
        env:
          STEPS_RESTORE_OUTPUTS_PREFIX: ${{ steps.restore.outputs.prefix }}
      - name: Verify Neovim nightly short commit id was output
        env:
          STEPS_BUILD_OUTPUTS_SHORT_COMMIT: ${{ steps.restore.outputs.short-commit }}
        run: |
          echo "Short commit: ${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}"
          if [[ -z "${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}" ]]; then
            echo "Short commit output is empty"
            exit 1
          fi

          # Verify that the restored Neovim nightly matches the pinned commit
          short="$(printf '%s' "${{ env.NEOVIM_NIGHTLY_COMMIT }}" | cut -c1-7)"
          if [[ "${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}" != "$short" ]]; then
            echo "Restored Neovim nightly does not match the pinned commit. Expected: $short, Got: ${STEPS_BUILD_OUTPUTS_SHORT_COMMIT}"
            exit 1
          fi

  busted-with-neovim-stable:
    name: Run Busted tests (stable Neovim, ${{ matrix.runner }})
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install stable Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: stable
      - name: Run Busted tests against the fixture
        uses: ./busted
        with:
          working-directory: busted/test-fixture
          strict: "true"

  busted-with-neovim-nightly:
    name: Run Busted tests (pinned nightly Neovim, ${{ matrix.runner }})
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: build-nightly
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore pinned Neovim nightly
        uses: ./restore-nightly
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}
      - name: Run Busted tests against the fixture
        uses: ./busted
        with:
          working-directory: busted/test-fixture
          strict: "true"

  ci:
    name: ci
    if: ${{ always() }}
    needs:
      - build-nightly
      - restore-nightly
      - busted-with-neovim-stable
      - busted-with-neovim-nightly
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify all required jobs succeeded
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}
        run: |
          echo "One or more required jobs did not succeed."
          exit 1

---
name: "Restore a previously built pinned Neovim nightly"
description: >-
  Download and extract the pinned Neovim nightly artifact published by the companion `build-nightly`
  action, exposing its install prefix so jobs can use the pinned build without rebuilding it.

inputs:
  artifact-name:
    description: "Name of the workflow artifact to download the build from."
    required: false
    default: neovim-nightly
  commit:
    description:
      "The expected https://github.com/neovim/neovim commit. The extracted Neovim is asserted to
      report this commit, so a mismatched or stale artifact fails loudly instead of being tested
      silently."
    required: true

outputs:
  prefix:
    description: "Install prefix of the extracted Neovim (binary at <prefix>/bin/nvim)."
    value: ${{ steps.config.outputs.prefix }}
  short-commit:
    description: "Short commit of the extracted Neovim (first 7 characters of the commit hash)."
    value: ${{ steps.extract.outputs.short-commit }}

runs:
  using: composite
  steps:
    - name: Resolve install prefix and artifact name
      id: config
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        RUNNER_ARCH: ${{ runner.arch }}
      run: |
        echo "prefix=${{ runner.temp }}/neovim-nightly" >> "$GITHUB_OUTPUT"
        echo "artifact-name=${ARTIFACT_NAME}-${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"

    - name: Download pinned Neovim nightly
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.config.outputs.artifact-name }}
        path: ${{ runner.temp }}/neovim-nightly-artifact

    - name: Extract pinned Neovim nightly
      id: extract
      shell: bash
      env:
        NEOVIM_COMMIT: ${{ inputs.commit }}
        NEOVIM_PREFIX: ${{ steps.config.outputs.prefix }}
      run: |
        mkdir -p "$NEOVIM_PREFIX"
        tar -xzf "${{ runner.temp }}/neovim-nightly-artifact/neovim-nightly.tar.gz" -C "$NEOVIM_PREFIX"
        "$NEOVIM_PREFIX/bin/nvim" --version

        # Assert the extracted Neovim matches the given commit, so a mismatched
        # or stale artifact fails loudly instead of being tested silently.
        short="$(printf '%s' "$NEOVIM_COMMIT" | cut -c1-7)"
        "$NEOVIM_PREFIX/bin/nvim" --version | grep --quiet "$short" || {
          echo "Extracted Neovim does not report the expected commit $NEOVIM_COMMIT (looked for $short)"
          exit 1
        }
        echo "short-commit=$short" >> "$GITHUB_OUTPUT"

    - name: Add Neovim nightly to PATH
      shell: bash
      env:
        NEOVIM_PREFIX: ${{ steps.config.outputs.prefix }}
      run: | # zizmor: ignore[github-env]
        echo "$NEOVIM_PREFIX/bin/" >> "$GITHUB_PATH"

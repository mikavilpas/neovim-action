---
name: "Run Busted tests with Neovim"
description: >-
  Run a Neovim plugin's Busted test suite (https://github.com/lunarmodules/busted).

  Requires Neovim to be installed first (e.g. via the companion `build-nightly` / `restore-nightly` actions, or a
  released version via `rhysd/action-setup-vim`).

  Scope:

  This action is deliberately Neovim-agnostic: it does NOT install Neovim. Put Neovim on PATH first.

  Reliability + speed:

  Lua 5.1 and LuaRocks themselves are installed from the OS package manager (apt) as prebuilt binaries, so the toolchain
  is never compiled and is always in sync with the runner image. The rocks on top (busted, nlua and their few small C
  dependencies such as luafilesystem) are compiled from source once on a cache miss, then cached: subsequent runs
  restore them and skip the build. The cache key includes the OS image version and architecture, so a cached rock can
  never be restored into an image it was not built against.

inputs:
  busted_version:
    description:
      "Version of busted to install. The luarocks rockspec revision (e.g. '-1') is intentionally omitted so the value
      stays clean semver that Renovate can track; luarocks resolves the latest revision automatically."
    required: false
    # renovate: datasource=github-releases depName=lunarmodules/busted
    default: "2.3.0"
  nlua_version:
    description:
      "Version of nlua to install. nlua runs Busted using Neovim as the Lua interpreter. The rockspec revision is
      omitted (see busted_version)."
    required: false
    # renovate: datasource=git-tags packageName=https://github.com/mfussenegger/nlua
    default: "0.3.2"
  luarocks_args:
    description: "Extra arguments appended to the `luarocks test` command."
    required: false
    default: ""
  before:
    description:
      "Optional shell script to run after the test harness is set up but before tests run (e.g. install extra rocks or
      prepare fixtures)."
    required: false
    default: ""
  install_dependencies:
    description:
      "Install the project's rockspec dependencies before running tests (via `luarocks make --only-deps`), so a plugin's
      runtime deps (e.g. plenary.nvim) are loadable. `luarocks test` only provides the test framework, not these. Set to
      'false' to manage dependencies yourself (e.g. via the 'before' input)."
    required: false
    default: "true"
  working-directory:
    description:
      "Directory to run the 'before' script and `luarocks test` in. Defaults to the workspace root; set it when the
      project's rockspec lives in a subdirectory."
    required: false
    default: "."
  strict:
    description:
      "When 'true', fail the build if the cache key cannot be built from fully-populated components (e.g. the runner
      does not expose ImageVersion). Off by default so consumers on unusual runners still work; enable it in your own CI
      to catch a silently-degraded cache key."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Verify Neovim is available on PATH
      shell: bash
      run: |
        if ! command -v nvim >/dev/null 2>&1; then
          echo "::error::nvim was not found on PATH. This action does not install Neovim; provide it first via the build-nightly/restore-nightly actions or rhysd/action-setup-vim."
          exit 1
        fi
        nvim --version

    - name: Install Lua 5.1 and LuaRocks from apt
      shell: bash
      # apt binaries are dynamically linked against this exact runner image, so
      # they stay consistent with it and need no caching or compilation.
      run: |
        sudo apt-get update
        sudo apt-get install --yes --no-install-recommends \
          lua5.1 liblua5.1-0-dev luarocks

    - name: Build and validate the cache key
      id: cache-key
      shell: bash
      env:
        STRICT: ${{ inputs.strict }}
        RUNNER_OS_NAME: ${{ runner.os }}
        RUNNER_ARCH_NAME: ${{ runner.arch }}
        BUSTED_VERSION: ${{ inputs.busted_version }}
        NLUA_VERSION: ${{ inputs.nlua_version }}
        INSTALL_DEPS: ${{ inputs.install_dependencies }}
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        # The cache holds compiled C rocks, so every component that identifies
        # the build environment must be present, or a rock could be restored
        # into an environment it was not built against. ImageVersion is a
        # runner-provided OS env var that is NOT in the `env` expression
        # context, which is exactly the kind of silently-empty value this
        # validation exists to catch.
        image_version="${ImageVersion:-}"

        missing=""
        [ -n "$RUNNER_OS_NAME" ]   || missing="${missing} runner.os"
        [ -n "$RUNNER_ARCH_NAME" ] || missing="${missing} runner.arch"
        [ -n "$image_version" ]    || missing="${missing} ImageVersion"
        [ -n "$BUSTED_VERSION" ]   || missing="${missing} busted_version"
        [ -n "$NLUA_VERSION" ]     || missing="${missing} nlua_version"

        if [ -n "$missing" ]; then
          message="Cannot build a reliable cache key; empty component(s):${missing}. A cached rock could be restored into an environment it was not built against."
          if [ "$STRICT" = "true" ]; then
            echo "::error::${message} (strict mode is on)"
            exit 1
          fi
          echo "::warning::${message} Proceeding with a degraded key (strict mode is off)."
        fi

        # Manual salt: bump whenever the action changes what it stores in
        # ~/.luarocks in a way no other key component captures.
        cache_version="v2"

        # ~/.luarocks also holds the project's rockspec dependencies, so fold
        # the rockspec contents into the key. The cache is all-or-nothing (exact
        # match, no restore-keys)
        rockspec_hash="none"
        if [ "$INSTALL_DEPS" = "true" ]; then
          shopt -s nullglob
          rockspecs=("${WORKING_DIR}"/*.rockspec)
          if [ "${#rockspecs[@]}" -gt 0 ]; then
            rockspec_hash="$(cat "${rockspecs[@]}" | sha256sum | cut -c1-16)"
          fi
        fi

        key="busted-${cache_version}-${RUNNER_OS_NAME}-${RUNNER_ARCH_NAME}-${image_version:-unknown}-busted${BUSTED_VERSION}-nlua${NLUA_VERSION}-deps${rockspec_hash}"
        echo "Using cache key: ${key}"
        echo "key=${key}" >> "$GITHUB_OUTPUT"

    - name: Restore cached Busted test harness
      id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.luarocks
        key: ${{ steps.cache-key.outputs.key }}

    - name: Install busted and nlua
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        BUSTED_VERSION: ${{ inputs.busted_version }}
        NLUA_VERSION: ${{ inputs.nlua_version }}
      run: |
        # Target Lua 5.1 explicitly: Neovim's runtime is LuaJIT (5.1 ABI) and
        # apt's luarocks otherwise defaults to the distro's newer Lua, which
        # installs rocks into a tree Neovim cannot load.
        luarocks --lua-version 5.1 install --local busted "$BUSTED_VERSION"
        luarocks --lua-version 5.1 install --local nlua "$NLUA_VERSION"

    - name: Add LuaRocks to PATH for later steps
      shell: bash
      run: | # zizmor: ignore[github-env]
        # Make busted/nlua and the installed rocks resolvable in the 'before'
        # and test steps. Trailing ';;' preserves Lua's default search paths.
        {
          echo "LUA_PATH=$(luarocks --lua-version 5.1 path --lr-path);;"
          echo "LUA_CPATH=$(luarocks --lua-version 5.1 path --lr-cpath);;"
        } >> "$GITHUB_ENV"
        echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"

    - name: Install the project's rockspec dependencies
      if: inputs.install_dependencies == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # `luarocks test` installs the test framework (busted/nlua) but NOT the
        # project's own dependencies, so install them from the rockspec.
        shopt -s nullglob
        rockspecs=(*.rockspec)
        if [ "${#rockspecs[@]}" -eq 1 ]; then
          echo "Installing dependencies from ${rockspecs[0]}"
          luarocks --lua-version 5.1 make --local --only-deps "${rockspecs[0]}"
        elif [ "${#rockspecs[@]}" -eq 0 ]; then
          echo "No rockspec found in $(pwd); skipping project dependency install."
        else
          echo "::warning::Found multiple rockspecs (${rockspecs[*]}); skipping automatic dependency install. Install them via the 'before' input or keep a single rockspec."
        fi

    - name: Run 'before' script
      if: inputs.before != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      # Run via env (not inline) so the script cannot be expanded into this
      # action's template, only executed.
      env:
        BEFORE_SCRIPT: ${{ inputs.before }}
      run: bash -e -c "$BEFORE_SCRIPT"

    - name: Run Busted tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        LUAROCKS_ARGS: ${{ inputs.luarocks_args }}
      run: |
        # Word-splitting of LUAROCKS_ARGS is intentional: it carries multiple
        # CLI arguments, not a single value.
        # shellcheck disable=SC2086
        luarocks --lua-version 5.1 test --local $LUAROCKS_ARGS
